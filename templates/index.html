<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔤 Real-Time OCR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
#canvasWrapper {
    position: relative;
    width: 416px;
    aspect-ratio: 4/3;
}
#video, #canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
body {
    background: #0d1117;
    color: #e6edf3;
}
#detectionFeed {
    max-height: 250px;
    overflow-y: auto;
    background: #000;
    padding: 10px;
    border: 1px solid #333;
}

#hoverPreview {
    position: fixed;
    display: none;
    z-index: 9999;
    border: 2px solid #00ffcc;
    background: #000;
    padding: 5px;
    border-radius: 8px;
}

#hoverPreview img {
    max-width: 60vw;
    max-height: 30vh;
    display: block;
}
</style>
</head>

<body>

<div class="container py-5 text-center">

<h2 class="mb-4">🔤 Real-Time OCR</h2>

<button class="btn btn-primary mb-3" id="toggleCameraBtn">📷 Enable Camera</button>
<button class="btn btn-secondary mb-3" id="switchCameraBtn" style="display:none;">
    🔄 Switch Camera
</button>

<div class="mb-3">
    <label class="mb-2">Upload Image for OCR</label>
    <input type="file" id="fileInput" accept="image/*" class="form-control">
</div>

<div class="d-flex justify-content-center">
    <div id="canvasWrapper">
        <video id="video" autoplay muted style="display:none;"></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<div class="mt-4 text-start">
    <h5>🧠 Detected Text:</h5>
    <div id="detectionFeed"></div>
</div>

</div>

<div id="hoverPreview">
    <img id="hoverImg">
</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = 416;
canvas.height = 416;

let facingMode = "environment";
let socket = null;
let isWebcam = false;
let lastTexts = new Map();
let lastTransform = null;
let isCapturing = false;
let reconnectDelay = 1000;
let maxDelay = 5000;

const rawCanvas = document.createElement("canvas");
const rawCtx = rawCanvas.getContext("2d");

rawCanvas.width = 416;
rawCanvas.height = 416;

// -------------------- WEBCAM --------------------
document.getElementById('toggleCameraBtn').onclick = () => {
    isWebcam ? disableWebcam() : enableWebcam();
};

function enableWebcam() {
    isWebcam = true;
    document.getElementById('toggleCameraBtn').textContent = "🚫 Disable Camera";

    document.getElementById("switchCameraBtn").style.display = "inline-block";

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode }
    })
    .then(stream => {
        video.srcObject = stream;
        video.style.display = "none";

        video.onloadeddata = () => {
            video.play();
            setupWebSocket();
        };
    })
    .catch(err => {
        console.error("Camera error:", err);
    });
}

function disableWebcam() {
    isWebcam = false;
    document.getElementById('toggleCameraBtn').textContent = "📷 Enable Camera";

    document.getElementById("switchCameraBtn").style.display = "none";

    if (socket) socket.close();

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.getElementById("switchCameraBtn").onclick = () => {
    facingMode = (facingMode === "environment") ? "user" : "environment";

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    enableWebcam();
};

// -------------------- WEBSOCKET --------------------
function retryConnection() {
    if (!isWebcam) return;

    setTimeout(() => {
        setupWebSocket();
        reconnectDelay = Math.min(reconnectDelay * 2, maxDelay);
    }, reconnectDelay);
}

function setupWebSocket() {
    if (socket && socket.readyState === WebSocket.OPEN) return;

    socket = new WebSocket("/ws");

    socket.onopen = () => {
        reconnectDelay = 1000;
        captureLoop();
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (lastTransform && data.words) {
            drawWordBoxes(data.words, lastTransform);
        }

        if (data.texts) {
            const textItems = Array.isArray(data.texts) ? data.texts : [data.texts];

            const validTexts = textItems.filter(item =>
                item && item.text && Array.isArray(item.bboxes) && item.bboxes.length > 0
            );

            if (validTexts.length > 0) {
                updateFeed(validTexts);
            }
        }
    };

    socket.onclose = retryConnection;
    socket.onerror = () => socket.close();
}

// ---------------- LETTERBOX ----------------
function drawImageLetterbox(img) {
    const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
    const nw = img.width * scale;
    const nh = img.height * scale;
    const dx = (canvas.width - nw) / 2;
    const dy = (canvas.height - nh) / 2;

    rawCtx.clearRect(0,0,canvas.width,canvas.height);
    rawCtx.drawImage(img, dx, dy, nw, nh);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(rawCanvas, 0, 0);

    return { scale, dx, dy };
}

function drawVideoLetterbox() {
    const vw = video.videoWidth;
    const vh = video.videoHeight;

    const scale = Math.min(canvas.width / vw, canvas.height / vh);
    const nw = vw * scale;
    const nh = vh * scale;
    const dx = (canvas.width - nw) / 2;
    const dy = (canvas.height - nh) / 2;

    rawCtx.clearRect(0,0,canvas.width,canvas.height);
    rawCtx.drawImage(video, dx, dy, nw, nh);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(rawCanvas, 0, 0);

    return { scale, dx, dy };
}

// -------------------- CAPTURE LOOP --------------------
function captureLoop() {
    if (isCapturing) return;
    isCapturing = true;

    function loop() {
        if (!isWebcam || !socket || socket.readyState !== WebSocket.OPEN) {
            isCapturing = false;
            return;
        }

        if (video.readyState !== 4) {
            requestAnimationFrame(loop);
            return;
        }

        lastTransform = drawVideoLetterbox();

        rawCanvas.toBlob(blob => {
            if (blob && socket.readyState === WebSocket.OPEN) {
                socket.send(blob);
            }
        }, "image/jpeg", 0.6);

        setTimeout(loop, 250); // 4 FPS
    }

    loop();
}

// -------------------- FILE UPLOAD --------------------
document.getElementById("fileInput").onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;

    disableWebcam();
    lastTexts.clear();
    detectionFeed.innerHTML = "";

    const reader = new FileReader();

    reader.onload = (e) => {
        const img = new Image();

        img.onload = () => {

            lastTransform = drawImageLetterbox(img);

            rawCanvas.toBlob(async (blob) => {

                if (!blob) {
                    return;
                }

                const formData = new FormData();
                formData.append("file", blob, "frame.jpg");

                const res = await fetch("/upload_frame", {
                    method: "POST",
                    body: formData
                });

                if (!res.ok) {
                    console.error("Server error:", res.status);
                    return;
                }

                const data = await res.json();

                if (!data || !data.words) {
                    console.error("Invalid response:", data);
                    return;
                }

                drawWordBoxes(data.words, lastTransform);
                updateFeed(data.texts);

            }, "image/jpeg", 0.6);
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
};

// -------------------- DRAW DETECTIONS --------------------
function drawWordBoxes(words, transform) {
    if (!transform || !Array.isArray(words)) return;

    const { scale, dx, dy } = transform;

    ctx.lineWidth = 2;
    ctx.font = "14px Arial";

    words.forEach(det => {
        const text = det.text;
        const box = det.bbox;

        if (!text || text.trim().length < 2 || !box) return;

        let [x1, y1, x2, y2] = box;
        
        ctx.strokeStyle = "lime";
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        ctx.fillStyle = "lime";
        ctx.fillText(text, x1, y1 - 5);
    });
}

function generateLineImage(bboxes, transform, text) {
    const tempCanvas = document.createElement("canvas");
    tempCanvas.width = canvas.width;
    tempCanvas.height = canvas.height;
    const tctx = tempCanvas.getContext("2d");

    tctx.drawImage(rawCanvas, 0, 0);

    if (!transform || !bboxes) return tempCanvas.toDataURL("image/png");

    const { scale, dx, dy } = transform;

    tctx.strokeStyle = "lime";
    tctx.lineWidth = 2;
    tctx.font = "14px Arial";
    tctx.fillStyle = "lime";

    bboxes.forEach(box => {
        let [x1, y1, x2, y2] = box;

        tctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    });

    return tempCanvas.toDataURL("image/png");
}

// -------------------- FEED --------------------
function updateFeed(textItems) {
    const feed = document.getElementById("detectionFeed");
    const now = Date.now();
    if (!Array.isArray(textItems)) {
        textItems = [textItems];
    }

    textItems.forEach(itemData => {
        const text = itemData.text;
        const bboxes = itemData.bboxes;

        if (!text) return;

        if (lastTexts.has(text) && now - lastTexts.get(text) < 2000) return;
        lastTexts.set(text, now);

        const imageData = generateLineImage(bboxes, lastTransform, text);

        const item = document.createElement("div");
        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.alignItems = "center";
        item.style.borderBottom = "1px solid #333";
        item.style.padding = "8px";
        item.style.gap = "10px";

        // ---------------- LEFT ----------------
        const left = document.createElement("div");

        const time = new Date().toLocaleTimeString();

        left.innerHTML = `
            📝 ${text} <br>
            <small>${time}</small><br>
        `;

        const btn = document.createElement("button");
        btn.className = "btn btn-sm btn-success mt-1";
        btn.textContent = "⬇ Download";

        btn.onclick = () => {
            const link = document.createElement("a");
            link.href = imageData;
            link.download = `ocr_${time.replace(/:/g, "-")}.png`;
            link.click();
        };

        left.appendChild(btn);

        // ---------------- RIGHT (PREVIEW) ----------------
        const preview = document.createElement("img");
        preview.src = imageData;
        preview.style.width = "80px";
        preview.style.height = "60px";
        preview.style.objectFit = "contain";
        preview.style.cursor = "pointer";

        const hoverBox = document.getElementById("hoverPreview");
        const hoverImg = document.getElementById("hoverImg");

        preview.onmouseenter = () => {
            hoverImg.src = imageData;
            hoverBox.style.display = "block";

            const rect = preview.getBoundingClientRect();

            let leftPos = rect.left + rect.width / 2 - 200;
            let topPos = rect.top - 150;

            if (leftPos < 10) leftPos = 10;
            if (leftPos + 400 > window.innerWidth) leftPos = window.innerWidth - 410;
            if (topPos < 10) topPos = rect.bottom + 10;

            hoverBox.style.left = leftPos + "px";
            hoverBox.style.top = topPos + "px";
        };

        preview.onmouseleave = () => {
            hoverBox.style.display = "none";
        };

        // ---------------- APPEND ----------------
        item.appendChild(left);
        item.appendChild(preview);
        feed.prepend(item);
    });
}

</script>

</body>
</html>
