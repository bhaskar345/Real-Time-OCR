<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🔤 Real-Time OCR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
#canvasWrapper {
    position: relative;
    width: 416px;
    aspect-ratio: 4/3;
}
#video, #canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
body {
    background: #0d1117;
    color: #e6edf3;
}
#detectionFeed {
    max-height: 250px;
    overflow-y: auto;
    background: #000;
    padding: 10px;
    border: 1px solid #333;
}

#hoverPreview {
    position: fixed;
    display: none;
    z-index: 9999;
    border: 2px solid #00ffcc;
    background: #000;
    padding: 5px;
    border-radius: 8px;
}

#hoverPreview img {
    max-width: 60vw;
    max-height: 30vh;
    display: block;
}
</style>
</head>

<body>

<div class="container py-5 text-center">

<h2 class="mb-4">🔤 Real-Time OCR</h2>

<button class="btn btn-primary mb-3" id="toggleCameraBtn">📷 Enable Camera</button>
<button class="btn btn-secondary mb-3" id="switchCameraBtn" style="display:none;">
    🔄 Switch Camera
</button>

<div class="mb-3">
    <label class="mb-2">Upload Image for OCR</label>
    <input type="file" id="fileInput" accept="image/*" class="form-control">
</div>

<div class="d-flex justify-content-center">
    <div id="canvasWrapper">
        <video id="video" autoplay muted style="display:none;"></video>
        <canvas id="canvas"></canvas>
    </div>
</div>

<div class="mt-4 text-start">
    <h5>🧠 Detected Text:</h5>
    <div id="detectionFeed"></div>
</div>

</div>

<!-- HOVER PREVIEW BOX -->
<div id="hoverPreview">
    <img id="hoverImg">
</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

canvas.width = 416;
canvas.height = 416;

let facingMode = "environment";
let socket = null;
let isWebcam = false;
let lastTexts = new Map();
let lastTransform = null;
let isCapturing = false;
let reconnectDelay = 1000;
let maxDelay = 5000;

const toggleBtn = document.getElementById('toggleCameraBtn');
const fileInput = document.getElementById("fileInput");

// -------------------- WEBCAM --------------------
toggleBtn.onclick = () => {
    isWebcam ? disableWebcam() : enableWebcam();
};

function enableWebcam() {
    isWebcam = true;
    toggleBtn.textContent = "🚫 Disable Camera";

    document.getElementById("switchCameraBtn").style.display = "inline-block";

    navigator.mediaDevices.getUserMedia({
        video: { facingMode: facingMode }
    })
    .then(stream => {
        video.srcObject = stream;
        video.style.display = "none";

        video.onloadeddata = () => {
            video.play();
            setupWebSocket();
        };
    })
    .catch(err => {
        console.error("Camera error:", err);
    });
}

function disableWebcam() {
    isWebcam = false;
    toggleBtn.textContent = "📷 Enable Camera";

    document.getElementById("switchCameraBtn").style.display = "none";

    if (socket) socket.close();

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

document.getElementById("switchCameraBtn").onclick = () => {
    facingMode = (facingMode === "environment") ? "user" : "environment";

    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }

    enableWebcam();
};

// -------------------- WEBSOCKET --------------------
function retryConnection() {
    if (!isWebcam) return;

    setTimeout(() => {
        setupWebSocket();
        reconnectDelay = Math.min(reconnectDelay * 2, maxDelay);
    }, reconnectDelay);
}

function setupWebSocket() {
    if (socket && socket.readyState === WebSocket.OPEN) return;

    socket = new WebSocket("/ws");

    socket.onopen = () => {
        reconnectDelay = 1000;
        captureLoop();
    };

    socket.onmessage = (event) => {
        const data = JSON.parse(event.data);
        if (!lastTransform) return;
        drawBoxes(data.detections || data, lastTransform);
    };

    socket.onclose = retryConnection;
    socket.onerror = () => socket.close();
}

// -------------------- CAPTURE LOOP --------------------
function captureLoop() {
    if (isCapturing) return;
    isCapturing = true;

    function loop() {
        if (!isWebcam || !socket || socket.readyState !== WebSocket.OPEN) {
            isCapturing = false;
            return;
        }

        if (video.readyState !== 4) {
            requestAnimationFrame(loop);
            return;
        }

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        lastTransform = { scale: 1, dx: 0, dy: 0 };

        canvas.toBlob(blob => {
            if (blob && socket.readyState === WebSocket.OPEN) {
                socket.send(blob);
            }
        }, "image/jpeg", 0.6);

        setTimeout(loop, 250); // 4 FPS
    }

    loop();
}

// -------------------- FILE UPLOAD --------------------
fileInput.onchange = () => {
    const file = fileInput.files[0];
    if (!file) return;

    disableWebcam();
    lastTexts.clear();
    document.getElementById("detectionFeed").innerHTML = "";

    const reader = new FileReader();

    reader.onload = (e) => {
        const img = new Image();

        img.onload = async () => {
            const transform = drawImageLetterbox(img);

            const res = await fetch("/upload_frame", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ image: e.target.result })
            });

            const data = await res.json();
            drawBoxes(data.detections || [], transform);
        };

        img.src = e.target.result;
    };

    reader.readAsDataURL(file);
};

function drawImageLetterbox(img) {
    const iw = img.width;
    const ih = img.height;

    const scale = Math.min(canvas.width / iw, canvas.height / ih);
    const nw = iw * scale;
    const nh = ih * scale;

    const dx = (canvas.width - nw) / 2;
    const dy = (canvas.height - nh) / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, dx, dy, nw, nh);

    return { scale, dx, dy };
}

// -------------------- DRAW DETECTIONS --------------------
function drawBoxes(detections, transform) {
    const { scale, dx, dy } = transform;
    let texts = [];

    detections.forEach(det => {
        let { x1, y1, x2, y2, text } = det;
        if (!text) return;

        texts.push(text);

        x1 = x1 * scale + dx;
        x2 = x2 * scale + dx;
        y1 = y1 * scale + dy;
        y2 = y2 * scale + dy;

        ctx.strokeStyle = "lime";
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

        ctx.fillStyle = "lime";
        ctx.fillText(text, x1, y1 - 5);
    });

    updateFeed(texts);
}

// -------------------- FEED --------------------
function updateFeed(texts) {
    const feed = document.getElementById("detectionFeed");
    const now = Date.now();

    texts.forEach(text => {
        if (lastTexts.has(text) && now - lastTexts.get(text) < 2000) return;
        lastTexts.set(text, now);

        const imageData = canvas.toDataURL("image/png");

        const item = document.createElement("div");
        item.style.display = "flex";
        item.style.justifyContent = "space-between";
        item.style.alignItems = "center";
        item.style.borderBottom = "1px solid #333";
        item.style.padding = "8px";
        item.style.gap = "10px";

        // ---------------- LEFT ----------------
        const left = document.createElement("div");

        const time = new Date().toLocaleTimeString();

        left.innerHTML = `
            📝 ${text} <br>
            <small>${time}</small><br>
        `;

        const btn = document.createElement("button");
        btn.className = "btn btn-sm btn-success mt-1";
        btn.textContent = "⬇ Download";

        btn.onclick = () => {
            const link = document.createElement("a");
            link.href = imageData; // bound correctly
            link.download = `ocr_${time.replace(/:/g, "-")}.png`;
            link.click();
        };

        left.appendChild(btn);

        // ---------------- RIGHT (PREVIEW) ----------------
        const preview = document.createElement("img");
        preview.src = imageData;
        preview.style.width = "80px";
        preview.style.height = "60px";
        preview.style.objectFit = "contain";
        preview.style.cursor = "pointer";

        const hoverBox = document.getElementById("hoverPreview");
        const hoverImg = document.getElementById("hoverImg");

        preview.onmouseenter = () => {
            hoverImg.src = imageData;
            hoverBox.style.display = "block";

            const rect = preview.getBoundingClientRect();

            let leftPos = rect.left + rect.width / 2 - 200;
            let topPos = rect.top - 150;

            if (leftPos < 10) leftPos = 10;
            if (leftPos + 400 > window.innerWidth) leftPos = window.innerWidth - 410;
            if (topPos < 10) topPos = rect.bottom + 10;

            hoverBox.style.left = leftPos + "px";
            hoverBox.style.top = topPos + "px";
        };

        preview.onmouseleave = () => {
            hoverBox.style.display = "none";
        };

        // ---------------- APPEND ----------------
        item.appendChild(left);
        item.appendChild(preview);
        feed.prepend(item);
    });
}

</script>

</body>
</html>
